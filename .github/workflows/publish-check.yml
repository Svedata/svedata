name: Publish Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  publish-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build + pack publishable packages
        run: bun run release:pack

      - name: Guard — no workspace: protocol in any tarball
        run: |
          set -euo pipefail
          fail=0
          tmp="$(mktemp -d)"
          for tgz in dist-tarballs/*.tgz; do
            name="$(basename "$tgz")"
            rm -rf "$tmp/extract" && mkdir -p "$tmp/extract"
            tar -xzf "$tgz" -C "$tmp/extract"
            if grep -q '"workspace:' "$tmp/extract/package/package.json"; then
              echo "::error file=$name::tarball package.json still contains 'workspace:' protocol"
              grep '"workspace:' "$tmp/extract/package/package.json"
              fail=1
            else
              echo "ok $name"
            fi
          done
          rm -rf "$tmp"
          exit "$fail"

      - name: Clean-room install + smoke test
        run: bun run release:verify
